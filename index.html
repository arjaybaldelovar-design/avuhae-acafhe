<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Nur-Ann</title>

<style>

body{
margin:0;
font-family:"Comic Sans MS",cursive;
text-align:center;
overflow-x:hidden;
color:#5a0040;

background:
linear-gradient(#ffd6ecbb,#ff9bd5bb),
url("https://images.unsplash.com/photo-1526047932273-341f2a7631f9");
background-size:cover;
background-position:center;
background-attachment:fixed;
}

h1{
margin-top:20px;
}

button{
background:#ff69b4;
border:none;
padding:12px 18px;
margin:6px;
border-radius:25px;
font-size:16px;
color:white;
cursor:pointer;
box-shadow:0 4px 10px rgba(0,0,0,.2);
}

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.5);
justify-content:center;
align-items:center;
z-index:10;
}

.modal-content{
background:white;
padding:25px;
border-radius:20px;
max-width:500px;
}

.cake{
font-size:90px;
cursor:pointer;
}

.gift{
font-size:90px;
cursor:pointer;
transition:transform .4s;
}

.gift.open{
transform:scale(1.3) rotate(10deg);
}

/* hearts */

.heart{
position:fixed;
font-size:22px;
pointer-events:none;
animation:heartUp 2.5s forwards;
}

@keyframes heartUp{
0%{opacity:1;transform:translateY(0) scale(1)}
100%{opacity:0;transform:translateY(-180px) scale(1.5)}
}

/* tulips */

.tulip{
position:fixed;
top:-40px;
font-size:30px;
animation:tulipFall 9s linear infinite;
pointer-events:none;
}

@keyframes tulipFall{
0%{transform:translateY(-50px) rotate(0deg)}
100%{transform:translateY(110vh) rotate(360deg)}
}

/* fireworks */

.fire{
position:fixed;
font-size:20px;
pointer-events:none;
}

/* cat */

#cat{
position:fixed;
bottom:10px;
left:0;
font-size:60px;
cursor:pointer;
z-index:20;
animation:walk .5s infinite alternate;
}

@keyframes walk{
0%{transform:translateY(0)}
100%{transform:translateY(-6px)}
}

#bubble{
position:fixed;
bottom:95px;
left:60px;
background:white;
padding:10px 14px;
border-radius:18px;
display:none;
max-width:220px;
box-shadow:0 4px 10px rgba(0,0,0,.3);
}

#gameArea{
position:relative;
height:200px;
background:#ffe3f4;
border-radius:12px;
overflow:hidden;
}

#gardenArea{
position:relative;
height:220px;
background:#fff0f7;
border-radius:10px;
}

</style>
</head>

<body>

<h1>🎂 Happy Birthday Nur-Ann J. Sarapuddin 🌷</h1>
<p>Tap the buttons for surprises 💗</p>

<button onclick="openModal('cake')">🎂 Cake</button>
<button onclick="openModal('letter')">💌 Letter</button>
<button onclick="openModal('game')">🎮 Tulip Game</button>
<button onclick="openModal('garden')">🌷 Garden</button>

<button onclick="fireworks()">🎆 Fireworks</button>
<button onclick="heartStorm()">💗 Heart Storm</button>
<button onclick="openModal('gift')">🎁 Gift</button>
<button onclick="secret()">💌 Secret</button>

<div id="cat">🐈</div>
<div id="bubble"></div>

<audio id="music" loop>
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_5f7e7f2b4c.mp3">
</audio>

<audio id="fireSound">
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_2b7b47b1e4.mp3">
</audio>

<audio id="giftSound">
<source src="https://cdn.pixabay.com/download/audio/2021/08/04/audio_88447b6c3a.mp3">
</audio>

<!-- cake -->

<div id="cake" class="modal">
<div class="modal-content">

<h2>Birthday Cake</h2>

<div class="cake" onclick="cakeInteract()">🎂</div>

<p>Tap the cake 🎂</p>

<button onclick="closeModal('cake')">Close</button>

</div>
</div>

<!-- letter -->

<div id="letter" class="modal">
<div class="modal-content">

<h2>A Letter For You</h2>

<p id="letterText"></p>

<button onclick="closeModal('letter')">Close</button>

</div>
</div>

<!-- game -->

<div id="game" class="modal">
<div class="modal-content">

<h2>Collect Tulips 🌷</h2>

<div id="gameArea"></div>

<p>Score: <span id="score">0</span></p>

<button onclick="startGame()">Start</button>

<button onclick="closeModal('game')">Close</button>

</div>
</div>

<!-- garden -->

<div id="garden" class="modal">
<div class="modal-content">

<h2>Grow Tulips 🌷</h2>

<div id="gardenArea"></div>

<button onclick="closeModal('garden')">Close</button>

</div>
</div>

<!-- gift -->

<div id="gift" class="modal">
<div class="modal-content">

<h2>Your Gift 🎁</h2>

<div class="gift" id="giftBox" onclick="openGift()">🎁</div>

<p id="giftText"></p>

<button onclick="closeModal('gift')">Close</button>

</div>
</div>

<script>

/* music */

document.body.addEventListener("click",()=>{
document.getElementById("music").play()
},{once:true})

/* modal */

function openModal(id){
document.getElementById(id).style.display="flex"
}

function closeModal(id){
document.getElementById(id).style.display="none"
}

/* tulip rain */

setInterval(()=>{

let t=document.createElement("div")

t.className="tulip"
t.innerHTML="🌷"
t.style.left=Math.random()*100+"vw"

document.body.appendChild(t)

setTimeout(()=>t.remove(),9000)

},350)

/* cake hearts */

function cakeInteract(){

for(let i=0;i<20;i++){

setTimeout(()=>{

let h=document.createElement("div")

h.className="heart"
h.innerHTML="💗"

h.style.left=Math.random()*window.innerWidth+"px"
h.style.top=window.innerHeight/2+"px"

document.body.appendChild(h)

setTimeout(()=>h.remove(),2000)

},i*40)

}

}

/* heart storm */

function heartStorm(){

for(let i=0;i<150;i++){

setTimeout(()=>{

let h=document.createElement("div")

h.className="heart"
h.innerHTML="💗"

h.style.left=Math.random()*window.innerWidth+"px"
h.style.top=Math.random()*window.innerHeight+"px"

document.body.appendChild(h)

setTimeout(()=>h.remove(),2500)

},i*20)

}

}

/* REAL FIREWORK EXPLOSION */

function fireworks(){

document.getElementById("fireSound").play()

let centerX=Math.random()*window.innerWidth
let centerY=Math.random()*window.innerHeight

let particles=70

for(let i=0;i<particles;i++){

let p=document.createElement("div")

p.className="fire"

let icons=["✨","💥","💖","💗","💜","🌟"]

p.innerHTML=icons[Math.floor(Math.random()*icons.length)]

p.style.left=centerX+"px"
p.style.top=centerY+"px"

document.body.appendChild(p)

let angle=Math.random()*Math.PI*2
let distance=80+Math.random()*120

let x=Math.cos(angle)*distance
let y=Math.sin(angle)*distance

p.animate([
{transform:"translate(0,0)",opacity:1},
{transform:`translate(${x}px,${y}px)`,opacity:0}
],{
duration:1200,
easing:"ease-out"
})

setTimeout(()=>p.remove(),1200)

}

}

/* cat */

let cat=document.getElementById("cat")
let bubble=document.getElementById("bubble")

let compliments=[
"You look beautiful today 🌸",
"You deserve happiness 💗",
"You brighten the world ✨",
"Your smile is amazing 😊",
"Today is your special day 🎂",
"You are wonderful 🌷",
"I hope your birthday is magical 💖",
"You make people happy 🌼"
]

let x=0
let dir=1

setInterval(()=>{

x+=2*dir

if(x>window.innerWidth-60)dir=-1
if(x<0)dir=1

cat.style.left=x+"px"

},40)

cat.onclick=function(){

let msg=compliments[Math.floor(Math.random()*compliments.length)]

bubble.innerText=msg
bubble.style.display="block"
bubble.style.left=(cat.offsetLeft+40)+"px"

setTimeout(()=>bubble.style.display="none",3000)

}

/* GIFT SURPRISE */

function openGift(){

document.getElementById("giftSound").play()

let box=document.getElementById("giftBox")

box.classList.add("open")

document.getElementById("giftText").innerText=
"Surprise 🌷 I didn't have a real gift to give you, so I made this little page instead. I just wanted to make something that might make you smile today. Happy Birthday Nur-Ann. I hope this year brings you lots of good memories, laughs, and moments you'll never forget."

heartStorm()

}

/* secret */

function secret(){
alert("Just wanted you to know that you are someone very special to me 💗")
}

/* LONGER CASUAL LETTER */

const text=`Happy Birthday Nur-Ann,

I wanted to make something small for you today because birthdays should feel special.

Sixteen is actually a pretty cool age. It's that moment where things start changing a little. New experiences, new memories, and a lot of moments you'll probably look back on later and smile about.

I hope today is full of good food, laughter, and people that make you happy. Even the small things can make a birthday great — random jokes, fun conversations, or just enjoying the day.

You're someone who brings a really nice energy around you. The kind of person that can make people feel comfortable just by being there. And honestly, that's something really special.

I hope this year brings you a lot of great things.

More laughs with friends.  
More fun adventures.  
More moments where you feel proud of yourself.  
And a lot of memories you'll keep for a long time.

Life can get busy sometimes, but I hope you always remember to enjoy the little moments too.

Anyway, I just wanted to say happy birthday again.  
Enjoy being sixteen and enjoy your day.

I hope this small surprise made you smile even just a little bit.

Happy Birthday Nur-Ann 🌷`

let i=0

function type(){

if(i<text.length){

document.getElementById("letterText").innerHTML+=text.charAt(i)

i++

setTimeout(type,35)

}

}

type()

/* game */

let score=0
let interval

function startGame(){

clearInterval(interval)

let area=document.getElementById("gameArea")
area.innerHTML=""

score=0
document.getElementById("score").innerText=score

interval=setInterval(()=>{

let t=document.createElement("div")

t.innerHTML="🌷"

t.style.position="absolute"
t.style.left=Math.random()*90+"%"
t.style.top=Math.random()*160+"px"
t.style.fontSize="30px"
t.style.cursor="pointer"

t.onclick=function(){

score++
document.getElementById("score").innerText=score
t.remove()

}

area.appendChild(t)

setTimeout(()=>t.remove(),2000)

},700)

}

/* garden */

let garden=document.getElementById("gardenArea")

garden.onclick=function(e){

let f=document.createElement("span")

f.innerHTML="🌷"
f.style.fontSize="35px"
f.style.position="absolute"

f.style.left=e.offsetX+"px"
f.style.top=e.offsetY+"px"

garden.appendChild(f)

}

</script>

</body>
</html>
